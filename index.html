<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CF Runner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#1e1e1e;--bg2:#252526;--bg3:#2d2d30;--bg4:#3c3c3c;
  --border:#3e3e42;--border2:#555;
  --text:#cccccc;--text2:#969696;--text3:#555;
  --accent:#0e639c;--accent2:#1177bb;
  --tab-active:#1e1e1e;--tab-inactive:#2d2d30;
  --green:#4ec9b0;--red:#f48771;--yellow:#dcdcaa;--blue:#9cdcfe;
  --activity-w:48px;
  --font-code:'JetBrains Mono',monospace;--font-ui:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px;}

/* Activity Bar */
.activity-bar{
  width:var(--activity-w);background:#333333;border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding-top:4px;flex-shrink:0;
}
.activity-btn{
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);position:relative;border-left:2px solid transparent;
}
.activity-btn:hover{color:var(--text);}
.activity-btn.active{color:var(--text);border-left-color:var(--text);}
.activity-bottom{margin-top:auto;margin-bottom:8px;}

/* Shell */
.shell{display:flex;height:100vh;flex-direction:column;}
.main-area{display:flex;flex:1;overflow:hidden;}
.workbench{display:flex;flex:1;overflow:hidden;flex-direction:column;}

/* Titlebar */
.titlebar{
  height:30px;background:#3c3c3c;display:flex;align-items:center;
  padding:0 12px;gap:8px;flex-shrink:0;user-select:none;
}
.titlebar-title{margin:0 auto;font-size:12px;color:var(--text2);}
.titlebar-menu-item{padding:4px 8px;font-size:12px;cursor:pointer;border-radius:3px;}
.titlebar-menu-item:hover{background:rgba(255,255,255,.1);}

/* Sidebar */
.sidebar{
  width:240px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:width .15s;
}
.sidebar.hidden{width:0;border:none;}
.sidebar-header{
  height:35px;display:flex;align-items:center;padding:0 12px;
  font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--text2);
  flex-shrink:0;user-select:none;white-space:nowrap;overflow:hidden;
}
.sidebar-actions{margin-left:auto;display:flex;gap:2px;flex-shrink:0;}
.icon-btn{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text2);border-radius:3px;font-size:15px;
}
.icon-btn:hover{color:var(--text);background:var(--bg4);}
.icon-btn svg{pointer-events:none;}

/* File Tree */
.file-tree{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:20px;}
.file-tree::-webkit-scrollbar{width:6px;}
.file-tree::-webkit-scrollbar-thumb{background:var(--bg4);}
.tree-item{
  display:flex;align-items:center;gap:4px;height:22px;padding-right:8px;
  cursor:pointer;white-space:nowrap;overflow:hidden;color:var(--text);font-size:13px;user-select:none;
}
.tree-item:hover{background:rgba(255,255,255,.06);}
.tree-item.selected{background:#094771;}
.tree-arrow{width:16px;flex-shrink:0;font-size:9px;color:var(--text2);text-align:center;line-height:1;}
.tree-icon{font-size:14px;flex-shrink:0;}
.tree-label{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.tree-rename-input{
  flex:1;background:#3c3c3c;border:1px solid var(--accent2);color:var(--text);
  font-family:var(--font-ui);font-size:13px;padding:0 4px;outline:none;min-width:0;height:20px;
}
.new-item-wrap{padding:2px 0;}
.new-item-input{
  background:#3c3c3c;border:1px solid var(--accent2);color:var(--text);
  font-family:var(--font-ui);font-size:13px;padding:1px 6px;outline:none;
  display:block;width:calc(100% - 16px);margin:0 8px;height:20px;
}

/* Context Menu */
.ctx-menu{
  position:fixed;background:#2d2d30;border:1px solid var(--border2);border-radius:4px;
  z-index:1000;min-width:165px;padding:4px 0;box-shadow:0 4px 14px rgba(0,0,0,.6);display:none;
}
.ctx-menu.open{display:block;}
.ctx-item{padding:5px 16px;cursor:pointer;font-size:12px;color:var(--text);}
.ctx-item:hover{background:var(--accent);}
.ctx-sep{height:1px;background:var(--border);margin:3px 0;}
.ctx-danger{color:var(--red)!important;}

/* Tabs */
.tabs-bar{
  height:35px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;overflow-x:auto;overflow-y:hidden;flex-shrink:0;
}
.tabs-bar::-webkit-scrollbar{height:2px;}
.tabs-bar::-webkit-scrollbar-thumb{background:var(--border2);}
.tab{
  display:flex;align-items:center;gap:6px;padding:0 14px 0 10px;
  height:35px;min-width:110px;max-width:200px;cursor:pointer;
  background:var(--tab-inactive);border-right:1px solid var(--border);
  color:var(--text2);font-size:12px;font-family:var(--font-code);
  white-space:nowrap;overflow:hidden;flex-shrink:0;border-top:1px solid transparent;
}
.tab.active{background:var(--tab-active);color:var(--text);border-top-color:var(--accent2);}
.tab-icon{font-size:14px;flex-shrink:0;}
.tab-name{overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.tab-close{
  width:18px;height:18px;display:flex;align-items:center;justify-content:center;
  border-radius:3px;flex-shrink:0;opacity:0;font-size:15px;line-height:1;
}
.tab:hover .tab-close,.tab.active .tab-close{opacity:.6;}
.tab-close:hover{background:rgba(255,255,255,.15);opacity:1!important;}

/* Breadcrumb */
.breadcrumb{
  height:22px;background:var(--bg);border-bottom:1px solid var(--border);
  display:none;align-items:center;padding:0 12px;gap:4px;
  font-size:12px;color:var(--text2);flex-shrink:0;overflow:hidden;white-space:nowrap;
}
.bc-sep{color:var(--text3);}

/* Editor */
.editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.editor-welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text2);gap:10px;
}
.editor-welcome h2{font-size:26px;font-weight:400;color:var(--text3);}
.editor-welcome p{font-size:12px;}
.editor-welcome kbd{
  background:var(--bg3);border:1px solid var(--border2);border-radius:3px;
  padding:1px 5px;font-family:var(--font-code);font-size:11px;
}
.editor-main{flex:1;display:none;flex-direction:column;overflow:hidden;}
.editor-scroll{flex:1;position:relative;overflow:hidden;}
.line-numbers{
  position:absolute;top:0;left:0;bottom:0;width:48px;
  color:var(--text3);font-family:var(--font-code);font-size:13px;line-height:20.8px;
  padding:14px 8px 14px 0;text-align:right;user-select:none;pointer-events:none;z-index:1;
  overflow:hidden;
}
.line-numbers div{height:20.8px;}
#code-editor{
  position:absolute;inset:0;
  background:var(--bg);color:var(--text);
  font-family:var(--font-code);font-size:13px;line-height:1.6;
  border:none;outline:none;resize:none;
  padding:14px 14px 14px 56px;
  tab-size:2;overflow:auto;caret-color:#aeafad;
  white-space:pre;overflow-wrap:normal;
}

/* Panel */
.panel-resize{height:4px;background:transparent;cursor:ns-resize;flex-shrink:0;}
.panel-resize:hover,.panel-resize:active{background:var(--accent2);}
.panel{
  height:200px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;min-height:60px;
}
.panel-tabs{
  height:35px;display:flex;align-items:center;border-bottom:1px solid var(--border);
  padding:0 8px;flex-shrink:0;
}
.panel-tab{
  padding:0 12px;height:35px;display:flex;align-items:center;font-size:12px;
  color:var(--text2);cursor:pointer;border-bottom:1px solid transparent;gap:5px;
}
.panel-tab.active{color:var(--text);border-bottom-color:var(--accent2);}
.panel-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
.run-btn{
  display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:3px;
  background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-family:var(--font-ui);
}
.run-btn:hover{background:var(--accent2);}
.run-btn:disabled{opacity:.5;cursor:not-allowed;}
.panel-body{flex:1;overflow-y:auto;padding:8px 12px;font-family:var(--font-code);font-size:12px;line-height:1.75;}
.panel-body::-webkit-scrollbar{width:6px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--bg4);}
.out-success{color:var(--green);}
.out-error{color:var(--red);}
.out-info{color:var(--text2);}
.out-content{color:var(--text);white-space:pre-wrap;word-break:break-all;}

/* Status Bar */
.statusbar{
  height:22px;background:#007acc;display:flex;align-items:center;
  padding:0 10px;gap:10px;flex-shrink:0;font-size:12px;color:#fff;user-select:none;
}
.sb-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:0 4px;height:100%;}
.sb-item:hover{background:rgba(255,255,255,.15);}
.sb-right{margin-left:auto;display:flex;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.status-dot.red{background:var(--red);}
.status-dot.yellow{background:var(--yellow);}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none;}
.running .spinner{display:block;}
.running .run-txt{display:none;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:60px;}
.modal-bg.open{display:flex;}
.modal{background:#252526;border:1px solid var(--border2);border-radius:6px;width:500px;max-width:95vw;padding:20px;}
.modal h3{font-size:14px;margin-bottom:16px;font-weight:500;}
.form-row{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;}
.form-input{
  width:100%;padding:6px 10px;background:#3c3c3c;border:1px solid var(--border2);
  border-radius:3px;color:var(--text);font-family:var(--font-code);font-size:12px;outline:none;
}
.form-input:focus{border-color:var(--accent2);}
.modal-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
.btn-cancel{padding:5px 14px;background:transparent;border:1px solid var(--border2);border-radius:3px;color:var(--text);cursor:pointer;font-size:12px;}
.btn-ok{padding:5px 14px;background:var(--accent);border:none;border-radius:3px;color:#fff;cursor:pointer;font-size:12px;}
</style>
</head>
<body>
<div class="shell">

<!-- Titlebar -->
<div class="titlebar">
  <span class="titlebar-menu-item" onclick="openSettings()">⚙ 設定</span>
  <span class="titlebar-title" id="title-text">CF Runner</span>
</div>

<div class="main-area">

<!-- Activity Bar -->
<div class="activity-bar">
  <div class="activity-btn active" id="act-explorer" onclick="toggleSidebar()" title="エクスプローラー (Ctrl+B)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </div>
  <div class="activity-bottom">
    <div class="activity-btn" onclick="openSettings()" title="設定">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    エクスプローラー
    <div class="sidebar-actions">
      <div class="icon-btn" title="新規ファイル (Ctrl+N)" onclick="startNew('file',null)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </div>
      <div class="icon-btn" title="新規フォルダ" onclick="startNew('folder',null)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      </div>
      <div class="icon-btn" title="すべて折りたたむ" onclick="collapseAll()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="21" y2="3"/><line x1="3" y1="21" x2="14" y2="10"/></svg>
      </div>
    </div>
  </div>
  <div class="file-tree" id="file-tree"></div>
</div>

<!-- Workbench -->
<div class="workbench">
  <div class="tabs-bar" id="tabs-bar"></div>
  <div class="editor-wrap">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="editor-welcome" id="welcome">
      <h2>CF Runner</h2>
      <p>左のパネルからファイルを選ぶか新規作成してください。</p>
      <p style="margin-top:6px"><kbd>Ctrl+N</kbd> 新規ファイル &nbsp; <kbd>Ctrl+B</kbd> サイドバー &nbsp; <kbd>Ctrl+Enter</kbd> 実行</p>
    </div>
    <div class="editor-main" id="editor-main">
      <div class="editor-scroll" id="editor-scroll">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="code-editor"
          spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
          onkeydown="editorKeydown(event)" oninput="editorInput()"
          onscroll="syncLN()" onclick="updateCursor()" onkeyup="updateCursor()"></textarea>
      </div>
    </div>
    <div class="panel-resize" onmousedown="startResize(event)"></div>
    <div class="panel" id="panel">
      <div class="panel-tabs">
        <div class="panel-tab active" id="ptab-terminal" onclick="switchPTab('terminal',this)">ターミナル</div>
        <div class="panel-tab" id="ptab-problems" onclick="switchPTab('problems',this)">問題</div>
        <div class="panel-tabs-actions panel-actions">
          <button class="run-btn" id="run-btn" onclick="runCode()">
            <span class="run-txt">▶ 実行</span><div class="spinner"></div>
          </button>
          <div class="icon-btn" onclick="clearTerminal()" title="クリア">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </div>
        </div>
      </div>
      <div class="panel-body" id="pbody-terminal">
        <div class="out-info">CF Runner へようこそ。ファイルを開いて ▶ 実行 を押してください。</div>
      </div>
      <div class="panel-body" id="pbody-problems" style="display:none">
        <div class="out-info">問題は検出されていません。</div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Status Bar -->
<div class="statusbar">
  <div class="sb-item" onclick="checkHealth()">
    <div class="status-dot red" id="sdot"></div>
    <span id="stxt">未設定</span>
  </div>
  <div class="sb-item" id="sb-lang"></div>
  <div class="sb-right">
    <div class="sb-item" id="sb-cursor">行 1, 列 1</div>
    <div class="sb-item">UTF-8</div>
  </div>
</div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="ctxDo('new-file')">新規ファイル</div>
  <div class="ctx-item" onclick="ctxDo('new-folder')">新規フォルダ</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxDo('rename')">名前の変更</div>
  <div class="ctx-item ctx-danger" onclick="ctxDo('delete')">削除</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxDo('copy-path')">パスをコピー</div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h3>⚙ 設定</h3>
    <div class="form-row">
      <label class="form-label">Worker URL（必須）</label>
      <input class="form-input" id="s-url" placeholder="https://cf-runner-worker.xxx.workers.dev"/>
    </div>
    <div class="form-row">
      <label class="form-label">タイムアウト（秒）</label>
      <input class="form-input" id="s-timeout" type="number" min="1" max="30" value="5"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSettings()">キャンセル</button>
      <button class="btn-ok" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────
let workerUrl = localStorage.getItem('cfr_url') || '';
let cfTimeout = parseInt(localStorage.getItem('cfr_to') || '5');

// Virtual filesystem: path → node
// Files: {type:'file', content:string}
// Folders: {type:'folder'}
// Folder paths end with '/'
let vfs = load('cfr_vfs') || {
  '/': {type:'folder'},
  '/main.js': {type:'file', content:'// Hello, CF Runner!\nconsole.log("Hello from Cloudflare!");\n'},
  '/utils.js': {type:'file', content:'// ユーティリティ関数\nfunction greet(name) {\n  return `Hello, ${name}!`;\n}\nconsole.log(greet("World"));\n'},
  '/scripts/': {type:'folder'},
  '/scripts/fibonacci.js': {type:'file', content:'function fib(n) {\n  if (n <= 1) return n;\n  return fib(n-1) + fib(n-2);\n}\nconst seq = Array.from({length: 12}, (_, i) => fib(i));\nconsole.log("Fibonacci:", seq);\n'},
  '/scripts/sort.js': {type:'file', content:'const arr = [64, 34, 25, 12, 22, 11, 90];\nconst sorted = [...arr].sort((a, b) => a - b);\nconsole.log("Original:", arr);\nconsole.log("Sorted:  ", sorted);\n'},
};

let tabs = load('cfr_tabs') || [];         // open file paths
let active = localStorage.getItem('cfr_active') || null;
let expanded = new Set(load('cfr_exp') || ['/']);
let ctxPath = null;
let pendingNew = null; // {type, parent}

// ── Persist ────────────────────────────────────────────────────
function load(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function persist() {
  localStorage.setItem('cfr_vfs', JSON.stringify(vfs));
  localStorage.setItem('cfr_tabs', JSON.stringify(tabs));
  localStorage.setItem('cfr_active', active || '');
  localStorage.setItem('cfr_exp', JSON.stringify([...expanded]));
}

// ── File helpers ───────────────────────────────────────────────
const EXT = {
  js:   {icon:'📄', lang:'javascript'},
  ts:   {icon:'📘', lang:'typescript'},
  py:   {icon:'🐍', lang:'python'},
  sh:   {icon:'🖥', lang:'bash'},
  go:   {icon:'🐹', lang:'go'},
  md:   {icon:'📝', lang:'markdown'},
  json: {icon:'🔧', lang:'json'},
  html: {icon:'🌐', lang:'html'},
  css:  {icon:'🎨', lang:'css'},
  txt:  {icon:'📃', lang:'text'},
};
function extOf(name) { const e = name.split('.').pop().toLowerCase(); return EXT[e] || {icon:'📄', lang:'text'}; }
function isDir(p) { return p.endsWith('/'); }
function nameOf(p) { const c = p.replace(/\/$/, ''); return c.slice(c.lastIndexOf('/') + 1); }
function parentOf(p) {
  const c = p.replace(/\/$/, '');
  const i = c.lastIndexOf('/');
  return i <= 0 ? '/' : c.slice(0, i + 1);
}
function childrenOf(dir) {
  const prefix = dir === '/' ? '/' : dir;
  return Object.keys(vfs).filter(p => {
    if (p === dir) return false;
    const parent = parentOf(p);
    return parent === prefix;
  });
}

// ── Tree Render ────────────────────────────────────────────────
function renderTree() {
  const root = document.getElementById('file-tree');
  root.innerHTML = '';
  renderDir('/', 0, root);
  if (pendingNew) injectNewInput(pendingNew.parent, pendingNew.type, root);
}

function renderDir(dir, depth, container) {
  const children = childrenOf(dir);
  children.sort((a, b) => {
    if (isDir(a) !== isDir(b)) return isDir(a) ? -1 : 1;
    return nameOf(a).localeCompare(nameOf(b));
  });
  for (const p of children) {
    const name = nameOf(p);
    const folder = isDir(p);
    const sel = p === active;
    const open = expanded.has(folder ? p.replace(/\/$/, '') : p);

    const el = document.createElement('div');
    el.className = 'tree-item' + (sel ? ' selected' : '');
    el.dataset.path = p;
    el.style.paddingLeft = (depth * 14 + 6) + 'px';
    if (folder) {
      el.innerHTML = `<span class="tree-arrow">${open ? '▾' : '▸'}</span><span class="tree-icon">📁</span><span class="tree-label">${esc(name)}</span>`;
      el.onclick = e => { e.stopPropagation(); toggleDir(p); };
    } else {
      el.innerHTML = `<span class="tree-arrow"></span><span class="tree-icon">${extOf(name).icon}</span><span class="tree-label">${esc(name)}</span>`;
      el.onclick = e => { e.stopPropagation(); openFile(p); };
    }
    el.ondblclick = e => { e.stopPropagation(); beginRename(p, el); };
    el.oncontextmenu = e => { e.preventDefault(); e.stopPropagation(); showCtx(e, p); };
    container.appendChild(el);
    if (folder && open) renderDir(p, depth + 1, container);
  }
}

function toggleDir(p) {
  const key = p.replace(/\/$/, '');
  if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
  persist(); renderTree();
}

function collapseAll() { expanded.clear(); expanded.add('/'); persist(); renderTree(); }

// ── New item input ─────────────────────────────────────────────
function startNew(type, parentOverride) {
  const parent = parentOverride || ctxParent() || '/';
  pendingNew = { type, parent };
  // Expand parent folder
  const key = parent === '/' ? '/' : parent.replace(/\/$/, '');
  expanded.add(key);
  renderTree();
  const inp = document.querySelector('.new-item-input');
  if (inp) inp.focus();
}

function ctxParent() {
  if (!ctxPath) return '/';
  return isDir(ctxPath) ? ctxPath : parentOf(ctxPath);
}

function injectNewInput(parent, type, root) {
  const depth = parent === '/' ? 0 : parent.replace(/\/$/, '').split('/').filter(Boolean).length;
  const wrap = document.createElement('div');
  wrap.className = 'new-item-wrap';
  const inp = document.createElement('input');
  inp.className = 'new-item-input';
  inp.placeholder = type === 'file' ? 'filename.js' : 'folder-name';
  inp.style.marginLeft = (depth * 14 + 6 + 20) + 'px';
  inp.style.width = `calc(100% - ${depth * 14 + 6 + 20 + 8}px)`;
  inp.onkeydown = e => {
    e.stopPropagation();
    if (e.key === 'Enter') commitNew(inp.value.trim(), parent, type);
    if (e.key === 'Escape') { pendingNew = null; renderTree(); }
  };
  inp.onblur = () => { if (inp.value.trim()) commitNew(inp.value.trim(), parent, type); else { pendingNew = null; renderTree(); } };
  wrap.appendChild(inp);

  // Find where to insert: after the parent row or its expanded children
  const items = [...root.querySelectorAll('.tree-item')];
  const parentKey = parent === '/' ? null : parent.replace(/\/$/, '');
  let insertAfter = parentKey ? items.find(el => el.dataset.path === parentKey || el.dataset.path === parent) : null;
  // Advance past all expanded children
  if (insertAfter) {
    let next = insertAfter.nextSibling;
    while (next && next.classList && next.classList.contains('tree-item')) {
      const nextDepth = parseInt(next.style.paddingLeft) || 0;
      const myDepth = parseInt(insertAfter.style.paddingLeft) || 0;
      if (nextDepth <= myDepth) break;
      insertAfter = next; next = next.nextSibling;
    }
    insertAfter.after(wrap);
  } else {
    root.appendChild(wrap);
  }
}

function commitNew(name, parent, type) {
  pendingNew = null;
  if (!name) { renderTree(); return; }
  const base = parent.endsWith('/') ? parent : parent + '/';
  let newPath = base + name + (type === 'folder' ? '/' : '');
  if (!vfs[newPath]) {
    vfs[newPath] = type === 'folder'
      ? {type: 'folder'}
      : {type: 'file', content: ''};
    if (type === 'folder') expanded.add(newPath.replace(/\/$/, ''));
  }
  persist(); renderTree();
  if (type === 'file') openFile(newPath);
}

// ── Rename ─────────────────────────────────────────────────────
function beginRename(path, el) {
  const label = el.querySelector('.tree-label');
  const name = nameOf(path);
  label.innerHTML = `<input class="tree-rename-input" value="${esc(name)}" />`;
  const inp = label.querySelector('input');
  inp.focus(); inp.select();
  inp.onkeydown = e => {
    e.stopPropagation();
    if (e.key === 'Enter') commitRename(path, inp.value.trim());
    if (e.key === 'Escape') renderTree();
  };
  inp.onblur = () => commitRename(path, inp.value.trim());
}

function commitRename(oldPath, newName) {
  if (!newName || newName === nameOf(oldPath)) { renderTree(); return; }
  const parent = parentOf(oldPath);
  const newPath = (parent === '/' ? '/' : parent) + newName + (isDir(oldPath) ? '/' : '');
  // Move all keys under old path
  for (const k of Object.keys(vfs)) {
    if (k === oldPath || k.startsWith(oldPath.endsWith('/') ? oldPath : oldPath + '/')) {
      const nk = newPath + k.slice(oldPath.length);
      vfs[nk] = vfs[k]; delete vfs[k];
    }
  }
  tabs = tabs.map(t => t === oldPath ? newPath : t);
  if (active === oldPath) { active = newPath; showEditor(newPath); }
  persist(); renderTabs(); renderTree();
}

// ── Delete ─────────────────────────────────────────────────────
function deleteItem(path) {
  if (!confirm(`「${nameOf(path)}」を削除しますか？`)) return;
  const keys = Object.keys(vfs).filter(k => k === path || k.startsWith(path.endsWith('/') ? path : path + '/'));
  for (const k of keys) delete vfs[k];
  tabs = tabs.filter(t => !keys.includes(t));
  if (keys.includes(active)) { active = tabs[tabs.length - 1] || null; }
  persist(); renderTabs(); renderTree();
  if (active) showEditor(active); else showWelcome();
}

// ── Context Menu ───────────────────────────────────────────────
function showCtx(e, path) {
  ctxPath = path;
  const m = document.getElementById('ctx-menu');
  m.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
  m.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
  m.classList.add('open');
}
function hideCtx() { document.getElementById('ctx-menu').classList.remove('open'); ctxPath = null; }
function ctxDo(action) {
  const path = ctxPath;
  hideCtx();
  if (action === 'new-file') startNew('file', ctxParent());
  else if (action === 'new-folder') startNew('folder', ctxParent());
  else if (action === 'rename') {
    const el = document.querySelector(`.tree-item[data-path="${CSS.escape(path)}"]`);
    if (el) beginRename(path, el);
  }
  else if (action === 'delete') deleteItem(path);
  else if (action === 'copy-path') navigator.clipboard?.writeText(path).catch(() => {});
}
document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) hideCtx();
  if (!e.target.closest('#file-tree') && !e.target.closest('.sidebar-actions') && pendingNew) { pendingNew = null; renderTree(); }
});
document.getElementById('file-tree').oncontextmenu = e => { e.preventDefault(); showCtx(e, '/'); };

// ── Tabs ───────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  for (const p of tabs) {
    const name = nameOf(p);
    const {icon} = extOf(name);
    const tab = document.createElement('div');
    tab.className = 'tab' + (p === active ? ' active' : '');
    tab.innerHTML = `<span class="tab-icon">${icon}</span><span class="tab-name">${esc(name)}</span><span class="tab-close" title="閉じる" onclick="closeTab(event,'${p.replace(/'/g,"\\'")}')">×</span>`;
    tab.onclick = () => switchToTab(p);
    bar.appendChild(tab);
  }
}

function openFile(path) {
  if (!tabs.includes(path)) tabs.push(path);
  active = path; persist(); renderTabs(); renderTree(); showEditor(path);
}
function switchToTab(path) { active = path; persist(); renderTabs(); renderTree(); showEditor(path); }
function closeTab(e, path) {
  e.stopPropagation();
  const i = tabs.indexOf(path);
  tabs.splice(i, 1);
  if (active === path) active = tabs[Math.min(i, tabs.length - 1)] || null;
  persist(); renderTabs(); renderTree();
  if (active) showEditor(active); else showWelcome();
}

// ── Editor ─────────────────────────────────────────────────────
function showWelcome() {
  document.getElementById('welcome').style.display = '';
  document.getElementById('editor-main').style.display = 'none';
  document.getElementById('breadcrumb').style.display = 'none';
  document.getElementById('title-text').textContent = 'CF Runner';
  document.getElementById('sb-lang').textContent = '';
}
function showEditor(path) {
  const node = vfs[path]; if (!node) return;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('editor-main').style.display = 'flex';
  const bc = document.getElementById('breadcrumb');
  bc.style.display = 'flex';
  const name = nameOf(path);
  const {icon, lang} = extOf(name);
  document.getElementById('code-editor').value = node.content || '';
  document.getElementById('title-text').textContent = name + ' — CF Runner';
  document.getElementById('sb-lang').textContent = lang;
  // Breadcrumb
  const parts = path.replace(/^\//, '').split('/').filter(Boolean);
  bc.innerHTML = '<span>workspace</span>' + parts.map(p => `<span class="bc-sep"> › </span><span>${esc(p)}</span>`).join('');
  updateLN(); updateCursor();
}
function editorInput() {
  if (!active || !vfs[active]) return;
  vfs[active].content = document.getElementById('code-editor').value;
  persist(); updateLN();
}
function updateLN() {
  const ta = document.getElementById('code-editor');
  const n = (ta.value.match(/\n/g) || []).length + 1;
  document.getElementById('line-numbers').innerHTML = Array.from({length:n}, (_,i) => `<div>${i+1}</div>`).join('');
}
function syncLN() {
  document.getElementById('line-numbers').scrollTop = document.getElementById('code-editor').scrollTop;
}
function updateCursor() {
  const ta = document.getElementById('code-editor');
  const lines = ta.value.slice(0, ta.selectionStart).split('\n');
  document.getElementById('sb-cursor').textContent = `行 ${lines.length}, 列 ${lines[lines.length-1].length+1}`;
}
function editorKeydown(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); runCode(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); flashMsg('保存済み ✓'); return; }
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    editorInput(); return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    const ta = e.target, s = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
    const line = ta.value.slice(lineStart, s);
    const indent = line.match(/^(\s*)/)[1];
    const extra = /[\{\[:]\s*$/.test(line.trimEnd()) ? '  ' : '';
    const ins = '\n' + indent + extra;
    ta.value = ta.value.slice(0, s) + ins + ta.value.slice(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + ins.length;
    editorInput(); return;
  }
  const PAIRS = {'(':')', '[':']', '{':'}', '"':'"', "'":"'", '`':'`'};
  if (PAIRS[e.key]) {
    const ta = e.target, s = ta.selectionStart, end = ta.selectionEnd;
    if (s !== end) {
      e.preventDefault();
      ta.value = ta.value.slice(0,s) + e.key + ta.value.slice(s,end) + PAIRS[e.key] + ta.value.slice(end);
      ta.selectionStart = s + 1; ta.selectionEnd = end + 1;
      editorInput();
    }
  }
}

// ── Panel ──────────────────────────────────────────────────────
function switchPTab(tab, el) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['terminal','problems'].forEach(t => {
    document.getElementById('pbody-'+t).style.display = t === tab ? '' : 'none';
  });
}
function clearTerminal() { document.getElementById('pbody-terminal').innerHTML = ''; }
function appendTerminal(html) {
  const el = document.getElementById('pbody-terminal');
  el.innerHTML += html; el.scrollTop = el.scrollHeight;
}

// Panel resize
let resizing = false, rsY = 0, rsH = 0;
function startResize(e) {
  resizing = true; rsY = e.clientY; rsH = document.getElementById('panel').offsetHeight;
  document.addEventListener('mousemove', doResize);
  document.addEventListener('mouseup', stopResize);
}
function doResize(e) {
  if (!resizing) return;
  const h = Math.max(60, Math.min(500, rsH + (rsY - e.clientY)));
  document.getElementById('panel').style.height = h + 'px';
}
function stopResize() { resizing = false; document.removeEventListener('mousemove', doResize); document.removeEventListener('mouseup', stopResize); }

// ── Run ────────────────────────────────────────────────────────
// JavaScriptはブラウザのWeb Workerで実行（Cloudflare Workerのeval制限を回避）
// Python/Go/Bash等はCloudflare Worker経由で外部ランナーに送る

function runJavaScriptInBrowser(code, timeoutMs) {
  return new Promise((resolve) => {
    const start = Date.now();
    const logs = [];

    // Web Worker用のコードをBlobで生成
    const workerCode = `
      // console をキャプチャ
      const _logs = [];
      const _origLog = console.log;
      ['log','error','warn','info'].forEach(level => {
        console[level] = (...args) => {
          _logs.push({ level, msg: args.map(v => {
            if (v === null) return 'null';
            if (v === undefined) return 'undefined';
            if (typeof v === 'object') { try { return JSON.stringify(v, null, 2); } catch(e) { return String(v); } }
            return String(v);
          }).join(' ') });
        };
      });

      // タイムアウト
      const _timer = setTimeout(() => {
        postMessage({ error: 'タイムアウト: ${timeoutMs}ms を超えました', logs: _logs, elapsed: Date.now() });
      }, ${timeoutMs});

      try {
        const _fn = new Function(${JSON.stringify(code)});
        const _result = _fn();
        if (_result && typeof _result.then === 'function') {
          _result.then(() => {
            clearTimeout(_timer);
            postMessage({ output: _logs.length ? _logs.map(l=>l.msg).join('\\n') : '(出力なし)', logs: _logs, elapsed: Date.now() });
          }).catch(e => {
            clearTimeout(_timer);
            postMessage({ error: e instanceof Error ? e.message : String(e), logs: _logs, elapsed: Date.now() });
          });
        } else {
          clearTimeout(_timer);
          postMessage({ output: _logs.length ? _logs.map(l=>l.msg).join('\\n') : '(出力なし)', logs: _logs, elapsed: Date.now() });
        }
      } catch(e) {
        clearTimeout(_timer);
        postMessage({ error: e instanceof Error ? e.message : String(e), logs: _logs, elapsed: Date.now() });
      }
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const blobUrl = URL.createObjectURL(blob);
    const worker = new Worker(blobUrl);

    worker.onmessage = (e) => {
      worker.terminate();
      URL.revokeObjectURL(blobUrl);
      const elapsed = Date.now() - start;
      resolve({ ...e.data, elapsed, region: 'browser' });
    };
    worker.onerror = (e) => {
      worker.terminate();
      URL.revokeObjectURL(blobUrl);
      resolve({ error: e.message || '実行エラー', logs, elapsed: Date.now() - start, region: 'browser' });
    };
  });
}

async function runCode() {
  if (!active || !vfs[active]) { appendTerminal('<div class="out-error">⚠ ファイルが開かれていません</div>'); return; }
  const code = vfs[active].content || '';
  const lang = extOf(nameOf(active)).lang || 'javascript';
  const name = nameOf(active);
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.classList.add('running');
  // ターミナルタブに切り替え
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('ptab-terminal').classList.add('active');
  ['terminal','problems'].forEach(t => document.getElementById('pbody-'+t).style.display = t==='terminal'?'':'none');
  const ts = new Date().toLocaleTimeString('ja-JP');
  appendTerminal(`<div class="out-info" style="margin-top:4px;border-top:1px solid var(--border);padding-top:4px">${ts}  ${esc(name)} (${lang})</div>`);

  try {
    let d;
    if (lang === 'javascript') {
      // ブラウザのWeb Workerで実行（evalが使える）
      d = await runJavaScriptInBrowser(code, cfTimeout * 1000);
      d.success = !d.error;
    } else {
      // Python/Go/Bash等はCloudflare Worker経由
      if (!workerUrl) {
        appendTerminal('<div class="out-error">⚠ Worker URL 未設定 — 設定から入力してください</div>');
        openSettings(); return;
      }
      const res = await fetch(workerUrl + '/api/run', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({code, language: lang, timeout: cfTimeout * 1000}),
      });
      d = await res.json();
    }

    if (d.success) {
      const where = lang === 'javascript' ? 'browser' : (d.region || '');
      appendTerminal(`<div class="out-success">✓ 成功 <span style="color:var(--text2);font-size:11px">${d.elapsed}ms · ${where}</span></div>`);
      appendTerminal(`<div class="out-content">${esc(d.output || '(出力なし)')}</div>`);
    } else {
      appendTerminal(`<div class="out-error">✗ エラー</div><div class="out-content" style="color:var(--red)">${esc(d.error || '不明なエラー')}</div>`);
      if (d.output) appendTerminal(`<div class="out-content">${esc(d.output)}</div>`);
    }
    if (d.logs?.length) d.logs.forEach(l => appendTerminal(`<div style="color:var(--text2);font-size:11px">[${l.level}] <span class="out-content">${esc(l.msg)}</span></div>`));
  } catch(e) {
    appendTerminal(`<div class="out-error">✗ エラー: ${esc(e.message)}</div>`);
  } finally {
    btn.disabled = false; btn.classList.remove('running');
  }
}

// ── Sidebar toggle ─────────────────────────────────────────────
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('act-explorer');
  sb.classList.toggle('hidden', !sidebarOpen);
  btn.classList.toggle('active', sidebarOpen);
}

// ── Settings ───────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-url').value = workerUrl;
  document.getElementById('s-timeout').value = cfTimeout;
  document.getElementById('modal').classList.add('open');
}
function closeSettings() { document.getElementById('modal').classList.remove('open'); }
function saveSettings() {
  workerUrl = document.getElementById('s-url').value.trim().replace(/\/$/, '');
  cfTimeout = parseInt(document.getElementById('s-timeout').value) || 5;
  localStorage.setItem('cfr_url', workerUrl);
  localStorage.setItem('cfr_to', cfTimeout);
  closeSettings(); checkHealth();
}

// ── Health ─────────────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('sdot'), txt = document.getElementById('stxt');
  if (!workerUrl) { dot.className='status-dot red'; txt.textContent='未設定'; return; }
  dot.className='status-dot yellow'; txt.textContent='接続中...';
  try {
    const res = await fetch(workerUrl + '/api/health', {signal: AbortSignal.timeout(4000)});
    if (res.ok) { const d = await res.json(); dot.className='status-dot'; txt.textContent=`接続済み (${d.region||'—'})`; }
    else throw 0;
  } catch { dot.className='status-dot red'; txt.textContent='接続失敗'; }
}

// ── Global shortcuts ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='n') { e.preventDefault(); startNew('file', null); }
  if ((e.ctrlKey||e.metaKey) && e.key==='b') { e.preventDefault(); toggleSidebar(); }
});

// ── Misc ───────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function flashMsg(m) { const el=document.getElementById('stxt'); const p=el.textContent; el.textContent=m; setTimeout(()=>el.textContent=p,1200); }

// ── Init ───────────────────────────────────────────────────────
renderTree(); renderTabs();
if (active && vfs[active]) showEditor(active); else showWelcome();
checkHealth();
</script>
